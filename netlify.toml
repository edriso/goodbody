# Static SPA build for the Good Bodies frontend app.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: serve index.html for any route so client-side routing
# survives a hard refresh or a deep link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
